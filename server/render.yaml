# Render Blueprint — deploy from repo with rootDir = server (or link this file).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agentos-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://agentos-blue.vercel.app
      - key: FRONTEND_URL
        value: https://agentos-blue.vercel.app
      - key: PUBLIC_API_URL
        value: https://agentos-sc05.onrender.com
      # Skip npm install in Ananta workspace on 512MB instances (content tickets skip automatically).
      # Set to "1" to force-skip for all tickets; upgrade to 1GB+ for code-mode npm install + typecheck.
      - key: ENGINEERING_SKIP_NPM_INSTALL
        value: "1"
