# Render Blueprint — deploy from repo with rootDir = server (or link this file).
# https://render.com/docs/blueprint-spec
#
# OSS adapters (Semgrep, Cover-Agent, Locust, Playwright) need host CLIs.
# Prefer instance type ≥1GB RAM (2GB+ recommended). 512MB will soft-fail / OOM.

services:
  - type: web
    name: agentos-api
    runtime: node
    rootDir: server
    plan: standard
    buildCommand: npm install && npm run build && bash scripts/install-oss-tools.sh
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://agentos-blue.vercel.app
      - key: FRONTEND_URL
        value: https://agentos-blue.vercel.app
      - key: PUBLIC_API_URL
        value: https://agentos-sc05.onrender.com
      # Missing Semgrep/Playwright/etc. → failed artifacts (not quiet skip) in production
      - key: OSS_TOOLS_REQUIRED
        value: "1"
      # Skip npm install in Ananta workspace on small instances (content tickets skip automatically).
      # With OSS tools enabled, keep plan ≥1GB and prefer ENGINEERING_SKIP_NPM_INSTALL=0 when possible.
      - key: ENGINEERING_SKIP_NPM_INSTALL
        value: "1"
